<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台扫码确认</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fb;
      color: #303133;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(88vw, 420px);
      padding: 32px;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 16px 48px rgba(31, 45, 61, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    p {
      margin: 0;
      color: #606266;
      line-height: 1.7;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <h1>请使用微信扫码</h1>
    <p>这个二维码用于管理后台登录或微信绑定。请使用已配置的小程序扫码，并在小程序内确认操作。</p>
  </main>
</body>
</html>
